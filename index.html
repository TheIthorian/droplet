<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Droplet</title>
    <meta
      name="description"
      content="A calm music-reactive site with droplets, ripples, and abstract visuals."
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>

    <div class="backdrop" aria-hidden="true">
      <div class="mist mist-a"></div>
      <div class="mist mist-b"></div>
      <div class="mist mist-c"></div>
      <div class="grain"></div>
    </div>

    <main class="chrome" aria-label="Droplet controls">
      <div class="chrome-inner">
        <header class="chrome-head">
          <p class="wordmark">Droplet</p>
          <p id="source-label" class="source">No source</p>
        </header>

        <div class="chrome-body">
          <div class="controls" role="group" aria-label="Audio controls">
            <button id="share-audio" class="btn btn-primary" type="button">
              Tab audio
            </button>
            <button id="mic-audio" class="btn" type="button">Mic</button>
            <button id="demo-mode" class="btn" type="button">Demo</button>
            <label class="btn btn-file" for="audio-file">Open file</label>
            <input id="audio-file" type="file" accept="audio/*" />
          </div>

          <div
            class="spectrum"
            role="group"
            aria-label="Frequency energy"
          >
            <div class="spectrum-row">
              <span class="spectrum-label">Low</span>
              <div class="spectrum-track">
                <div id="bass-meter" class="spectrum-fill"></div>
              </div>
            </div>
            <div class="spectrum-row">
              <span class="spectrum-label">Mid</span>
              <div class="spectrum-track">
                <div id="mid-meter" class="spectrum-fill"></div>
              </div>
            </div>
            <div class="spectrum-row">
              <span class="spectrum-label">High</span>
              <div class="spectrum-track">
                <div id="high-meter" class="spectrum-fill"></div>
              </div>
            </div>
          </div>
        </div>

        <p id="status" class="status">
          Idle — tab audio is clearest when your player is in this tab.
        </p>
      </div>
    </main>

    <audio id="audio-player" preload="metadata" crossorigin="anonymous"></audio>

    <script src="./script.js"></script>
  </body>
</html>
